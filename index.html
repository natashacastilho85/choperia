<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#120d04">
<title>🍺 Choperia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #1a4a1b;
  --bg2:      #1f5820;
  --bg3:      #265c27;
  --card:     #1d521e;
  --border:   #2e7030;
  --gold:     #e8920a;
  --gold-lt:  #f5b040;
  --gold-dk:  #a86308;
  --text:     #ffffff;
  --text2:    #c8c8c8;
  --text3:    #c0c0c0;
  --green:    #56c464;
  --red:      #e05050;
  --yellow:   #f0c040;
  --blue:     #4090e0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}

/* ── TOP BAR ── */
.topbar{background:var(--bg2);border-bottom:2px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:3px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.net-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);background:var(--bg3);padding:4px 8px;border-radius:20px;border:1px solid var(--border)}
.net-dot{width:7px;height:7px;border-radius:50%}

/* ── MAIN ── */
.main{flex:1;padding:14px 14px 84px;overflow-y:auto;max-width:700px;width:100%;margin:0 auto}

/* ── BOTTOM NAV ── */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--border);display:flex;z-index:100;max-width:700px;margin:0 auto}
@media(min-width:700px){.bottomnav{left:50%;transform:translateX(-50%);right:auto;width:700px}}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 10px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:700;gap:3px;border:none;background:none;font-family:'Nunito',sans-serif;transition:color .2s}
.nav-btn.active{color:var(--gold)}
.nav-btn svg{width:22px;height:22px;stroke-width:1.8}

/* ── SECTION HEADER ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gold)}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
.card+.card{margin-top:10px}

/* ── MESA GRID ── */
.mesas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.mesa-card{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:14px 10px 12px;text-align:center;cursor:pointer;transition:all .15s;position:relative;user-select:none}
.mesa-card:active{transform:scale(.96)}
.mesa-card.ocupada{border-color:var(--gold);background:#231900}
.mesa-card.alerta{border-color:var(--red)}
.mesa-num{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--gold);line-height:1}
.mesa-label{font-size:11px;color:var(--text3);margin-top:2px;font-weight:700}
.mesa-extra{font-size:12px;color:var(--text2);margin-top:4px}
.mesa-total{font-size:17px;font-weight:800;color:var(--text);margin-top:4px}
.couvert-pip{position:absolute;top:8px;right:8px;background:var(--gold);color:#1a0e00;font-size:8px;font-weight:800;padding:2px 5px;border-radius:4px;letter-spacing:.5px}

/* ── BUTTONS ── */
.btn{padding:10px 16px;border-radius:10px;border:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;line-height:1}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--gold);color:#180e00}
.btn-primary:hover{background:var(--gold-lt)}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:#3d1212;color:#ff7070;border:1px solid #5a1c1c}
.btn-success{background:#123d14;color:#70e070;border:1px solid #1c5a1e}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-icon{padding:7px;border-radius:8px}
.w-full{width:100%}
.flex-1{flex:1}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:22px 22px 0 0;width:100%;max-width:660px;max-height:92vh;overflow-y:auto;padding:20px 18px 28px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:1.5px;margin-bottom:14px}

/* ── FORM ── */
.fg{margin-bottom:12px}
.lbl{display:block;font-size:11px;font-weight:800;color:var(--text2);margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:border .15s}
.inp:focus{border-color:var(--gold)}
select.inp option{background:var(--bg3);color:var(--text)}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:10px 0}

/* ── LIST ITEMS ── */
.li{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.li:last-child{border-bottom:none}

/* ── TABS ── */
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:12px;font-weight:800;white-space:nowrap;cursor:pointer;transition:all .15s;font-family:'Nunito',sans-serif}
.tab.active{background:var(--gold);color:#180e00;border-color:var(--gold)}

/* ── TOTAL ROWS ── */
.tr{display:flex;justify-content:space-between;align-items:center;padding:7px 0}
.tr.big{font-size:20px;font-weight:800;color:var(--gold);border-top:1px solid var(--border);margin-top:6px;padding-top:12px}

/* ── PAYMENT ── */
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pay-btn{padding:12px;border-radius:10px;border:2px solid var(--border);background:var(--card);color:var(--text2);font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:all .15s;text-align:center}
.pay-btn.sel{border-color:var(--gold);background:#2a1900;color:var(--gold)}

/* ── BADGE ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.3px}
.badge-g{background:#0d2e10;color:#70e070}
.badge-r{background:#2e0d0d;color:#ff7070}
.badge-y{background:#2e2a0d;color:#f0c040}
.badge-gray{background:var(--bg3);color:var(--text2)}

/* ── STOCK BAR ── */
.sbar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:4px}
.sbar-fill{height:100%;border-radius:2px;transition:width .3s}

/* ── ALERT ── */
.alert{padding:10px 14px;border-radius:10px;font-size:12px;font-weight:700;margin-bottom:12px}
.alert-warn{background:#2e2208;border:1px solid #4a380e;color:#f0c040}
.alert-err{background:#2e0e0e;border:1px solid #4a1a1a;color:#ff8080}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:10px}

/* ── TOAST ── */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;z-index:400;white-space:nowrap;animation:tin .25s,tout .3s 2.4s forwards;pointer-events:none}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateX(-50%) translateY(8px)}}

/* ── QTY CTRL ── */
.qc{display:flex;align-items:center;gap:8px}
.qbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:800;font-family:'Nunito',sans-serif}
.qval{font-size:16px;font-weight:800;min-width:32px;text-align:center}

/* ── SPINNER ── */
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── PRINT ── */
@media print {
  .bottomnav, .topbar, .btn, .tabs, input, select, .alert { display: none !important; }
  body { background: white !important; color: black !important; font-size: 12px; }
  .card { border: 1px solid #ccc !important; background: white !important; break-inside: avoid; }
  .main { padding: 0 !important; }
  .sec-title, .modal-title { color: #333 !important; }
  .c-gold, .c-green, .c-red { color: #333 !important; }
  #printArea { display: block !important; }
  .no-print { display: none !important; }
}

/* utils */
.flex{display:flex}.gap8{gap:8px}.gap10{gap:10px}.aic{align-items:center}.jsb{justify-content:space-between}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.f700{font-weight:700}.f800{font-weight:800}.fs12{font-size:12px}.fs11{font-size:11px}
.tc{text-align:center}.tr-txt{text-align:right}
.c-muted{color:var(--text3)}.c-gold{color:var(--gold)}.c-green{color:var(--green)}.c-red{color:var(--red)}
</style>
</head>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const SB_URL = 'https://shcmwogxctqsbmefzvmx.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNoY213b2d4Y3Rxc2JtZWZ6dm14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODMxNTEsImV4cCI6MjA5NTU1OTE1MX0.4Kb6BOBsozIXzJ4klZwt5jvPzVz0fnxO4QnR-wqlv-4';

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const S = {
  page: 'mesas',
  online: false,
  mesas: [],
  categorias: [],
  produtos: [],
  comandas: [],
  itens: {},
  caixaSessao: null,
  couvert: { valor: 0, ativo: false },
  catTab: null,
  estoqSearch: '',
  estoqCat: null,
  currentUser: null,
};

// ══════════════════════════════════════════════
// INDEXEDDB
// ══════════════════════════════════════════════
let IDB;
function idbInit() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('choperia_db', 3);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      ['mesas','categorias','produtos','comandas','itens_comanda',
       'movimentacoes_estoque','caixa_sessoes','caixa_movimentacoes','couvert_config', 'despesas'].forEach(s => {
        if (!d.objectStoreNames.contains(s)) d.createObjectStore(s, { keyPath: 'id' });
      });
    };
    r.onsuccess = e => { IDB = e.target.result; res(); };
    r.onerror = rej;
  });
}
function idbAll(store) {
  return new Promise((res, rej) => {
    const r = IDB.transaction(store,'readonly').objectStore(store).getAll();
    r.onsuccess = () => res(r.result);
    r.onerror = rej;
  });
}
function idbPut(store, obj) {
  return new Promise((res, rej) => {
    const r = IDB.transaction(store,'readwrite').objectStore(store).put(obj);
    r.onsuccess = res; r.onerror = rej;
  });
}
function idbDel(store, id) {
  return new Promise((res, rej) => {
    const r = IDB.transaction(store,'readwrite').objectStore(store).delete(id);
    r.onsuccess = res; r.onerror = rej;
  });
}

// ══════════════════════════════════════════════
// SUPABASE REST API
// ══════════════════════════════════════════════
function sbH() {
  return { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY,
           'Content-Type': 'application/json', 'Prefer': 'return=representation' };
}
async function sbGet(t, q='') {
  const r = await fetch(`${SB_URL}/rest/v1/${t}?${q}`, { headers: sbH() });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPost(t, d) {
  const r = await fetch(`${SB_URL}/rest/v1/${t}`, { method:'POST', headers:sbH(), body:JSON.stringify(d) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPatch(t, f, d) {
  const r = await fetch(`${SB_URL}/rest/v1/${t}?${f}`, { method:'PATCH', headers:sbH(), body:JSON.stringify(d) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDel(t, f) {
  const r = await fetch(`${SB_URL}/rest/v1/${t}?${f}`, { method:'DELETE', headers:sbH() });
  if (!r.ok) throw new Error(await r.text());
}

// ══════════════════════════════════════════════
// DATA LOADING
// ══════════════════════════════════════════════
async function loadLocal() {
  S.mesas = (await idbAll('mesas')).filter(m => m.ativa).sort((a,b) => a.numero-b.numero);
  S.categorias = (await idbAll('categorias')).sort((a,b) => (a.ordem||0)-(b.ordem||0));
  S.produtos = (await idbAll('produtos')).filter(p => p.ativo).sort((a,b) => a.nome.localeCompare(b.nome));
  S.comandas = (await idbAll('comandas')).filter(c => c.status==='aberta');
  const allItens = await idbAll('itens_comanda');
  S.itens = {};
  allItens.forEach(i => { if (!S.itens[i.comanda_id]) S.itens[i.comanda_id]=[]; S.itens[i.comanda_id].push(i); });
  const cv = (await idbAll('couvert_config')).sort((a,b) => new Date(b.criado_em)-new Date(a.criado_em));
  if (cv[0]) S.couvert = cv[0];
  const sess = (await idbAll('caixa_sessoes')).filter(s => s.status==='aberta');
  S.caixaSessao = sess[0] || null;
}
async function loadRemote() {
  if (!S.online) return;
  try {
    console.log('Carregando do Supabase...');
    const [mesas, cats, prods, comds, cv, sess] = await Promise.all([
      sbGet('mesas','ativa=eq.true&order=numero'),
      sbGet('categorias','order=ordem'),
      sbGet('produtos','ativo=eq.true&order=nome'),
      sbGet('comandas','status=eq.aberta&order=abertura_at'),
      sbGet('couvert_config','order=criado_em.desc&limit=1'),
      sbGet('caixa_sessoes','status=eq.aberta&order=abertura_at.desc&limit=1'),
    ]);
    if (mesas.length > 0) { S.mesas = mesas; for (const m of mesas) await idbPut('mesas', m); }
    if (cats.length > 0) { S.categorias = cats; for (const c of cats) await idbPut('categorias', c); }
    if (prods.length > 0) { S.produtos = prods; for (const p of prods) await idbPut('produtos', p); }
    if (comds.length > 0) {
      S.comandas = comds;
      for (const c of comds) {
        await idbPut('comandas', c);
        const itens = await sbGet('itens_comanda', 'comanda_id=eq.'+c.id+'&order=created_at');
        S.itens[c.id] = itens;
        for (const i of itens) await idbPut('itens_comanda', i);
      }
    }
    S.couvert = cv[0]||{valor:0,ativo:false};
    S.caixaSessao = sess[0]||null;
  } catch(e) { console.error('Sync error:', e); toast('Aviso: erro ao sincronizar — ' + e.message); }
}

function uid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0; return (c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}
function fmtR(v) { return 'R$ ' + Number(v||0).toFixed(2).replace('.',','); }
function fmtT(dt) { if(!dt) return ''; const d=new Date(dt); return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function elapsed(dt) {
  if (!dt) return '';
  const m = Math.floor((Date.now()-new Date(dt))/60000);
  if (m < 60) return m+'min';
  const h = Math.floor(m/60), mm = m%60;
  return h+'h'+(mm>0?String(mm).padStart(2,'0'):'');
}
function toast(msg, ms=3000) {
  const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), ms+300);
}
function getProd(id) { return S.produtos.find(p=>p.id===id); }
function getMesa(id) { return S.mesas.find(m=>m.id===id); }
function getComanda(mesaId) { return S.comandas.find(c=>c.mesa_id===mesaId); }
function comandaTotal(cid) {
  const itens = S.itens[cid]||[];
  const sub = itens.reduce((s,i)=>s+(i.quantidade*i.preco_unitario),0);
  const c = S.comandas.find(x=>x.id===cid);
  const cv = c ? (c.couvert_valor||0)*(c.couvert_quantidade||0) : 0;
  return sub + cv;
}
function groupItens(itens) {
  const m = {};
  itens.forEach(i => {
    const k = i.produto_id+'|'+(i.observacao||'');
    if (!m[k]) m[k] = {...i, quantidade:0};
    m[k].quantidade += i.quantidade;
  });
  return Object.values(m);
}

// OFFLINE SYNC QUEUE
// ══════════════════════════════════════════════
async function syncQueue() {
  if (!S.online) { toast('Sem internet'); return; }
  let ok = 0, erros = [];

  async function patchOrPost(tabela, id, d) {
    try {
      const pr = await fetch(SB_URL+'/rest/v1/'+tabela+'?id=eq.'+id, {
        method: 'PATCH',
        headers: {...sbH(), 'Prefer': 'return=representation'},
        body: JSON.stringify(d)
      });
      const rows = await pr.json().catch(()=>[]);
      if (rows && rows.length > 0) { ok++; return; } 
      const pr2 = await fetch(SB_URL+'/rest/v1/'+tabela, {
        method: 'POST', headers: sbH(), body: JSON.stringify(d)
      });
      if (pr2.ok) ok++;
      else { const t=await pr2.text(); erros.push(tabela+' POST: '+t.slice(0,80)); }
    } catch(e) { erros.push(tabela+': '+e.message.slice(0,60)); }
  }

  // ── DESPESAS ──
  const despCols = ['id','descricao','valor','data_vencimento','status'];
  for (const dp of await idbAll('despesas')) {
    const d = Object.fromEntries(Object.entries(dp).filter(([k])=>despCols.includes(k)));
    await patchOrPost('despesas', dp.id, d);
  }

  // ── MESAS ──
  const mesaCols = ['id','numero','nome','lugares','categoria','ativa'];
  for (const m of await idbAll('mesas')) {
    const d = Object.fromEntries(Object.entries(m).filter(([k])=>mesaCols.includes(k)));
    await patchOrPost('mesas', m.id, d);
  }

  // ── CATEGORIAS ──
  for (const c of await idbAll('categorias')) await patchOrPost('categorias', c.id, {id:c.id,nome:c.nome,ordem:c.ordem});

  // ── PRODUTOS ──
  const prodCols = ['id','nome','categoria_id','preco','unidade','controla_estoque','quantidade_estoque','estoque_minimo','fator_estoque','ativo','composicao','preco_promo','promo_inicio','promo_fim','promo_dias','promo_data','is_insumo','created_at'];
  for (const p of await idbAll('produtos')) {
    const d = Object.fromEntries(Object.entries(p).filter(([k])=>prodCols.includes(k)));
    await patchOrPost('produtos', p.id, d);
  }

  // ── COMANDAS ──
  const comCols = ['id','mesa_id','abertura_at','fechamento_at','status','couvert_valor','couvert_quantidade','desconto','total','forma_pagamento','observacao'];
  for (const c of await idbAll('comandas')) {
    const d = Object.fromEntries(Object.entries(c).filter(([k])=>comCols.includes(k)));
    await patchOrPost('comandas', c.id, d);
    if (c.nome_cliente) {
      try { await fetch(SB_URL+'/rest/v1/comandas?id=eq.'+c.id,{method:'PATCH',headers:sbH(),body:JSON.stringify({nome_cliente:c.nome_cliente})}); } catch(e){}
    }
  }

  // ── ITENS COMANDA ──
  const itemCols = ['id','comanda_id','produto_id','quantidade','preco_unitario','observacao','status','created_at'];
  for (const i of await idbAll('itens_comanda')) {
    const d = Object.fromEntries(Object.entries(i).filter(([k])=>itemCols.includes(k)));
    await patchOrPost('itens_comanda', i.id, d);
  }

  // ── MOVIMENTAÇÕES ESTOQUE ──
  const movCols = ['id','produto_id','tipo','quantidade','valor_unitario','observacao','created_at'];
  for (const m of await idbAll('movimentacoes_estoque')) {
    const d = Object.fromEntries(Object.entries(m).filter(([k])=>movCols.includes(k)));
    await patchOrPost('movimentacoes_estoque', m.id, d);
  }

  // ── CAIXA SESSÕES ──
  const sessCols = ['id','abertura_at','fechamento_at','status','valor_abertura','valor_fechamento_informado','observacao'];
  for (const s of await idbAll('caixa_sessoes')) {
    const d = Object.fromEntries(Object.entries(s).filter(([k])=>sessCols.includes(k)));
    await patchOrPost('caixa_sessoes', s.id, d);
  }

  // ── CAIXA MOVIMENTAÇÕES ──
  const cMovCols = ['id','sessao_id','tipo','valor','forma_pagamento','descricao','created_at'];
  for (const m of await idbAll('caixa_movimentacoes')) {
    const d = Object.fromEntries(Object.entries(m).filter(([k])=>cMovCols.includes(k)));
    if (m.comanda_id) d.comanda_id = m.comanda_id;
    await patchOrPost('caixa_movimentacoes', m.id, d);
  }

  if (erros.length > 0) {
    erros.forEach((e,i) => console.error('Erro '+(i+1)+':', e));
    toast('⚠️ '+ok+' enviados. Erro: ' + erros[0], 8000);
  } else {
    toast('✅ '+ok+' registos enviados!', 4000);
  }
}

async function hashPass(p) {
  try {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  } catch(e) {
    let h = 0x811c9dc5;
    for (let i = 0; i < p.length; i++) {
      h ^= p.charCodeAt(i);
      h = (h * 0x01000193) >>> 0;
    }
    let s = '';
    for (let i = 0; i < p.length; i++) {
      h ^= (p.charCodeAt(i) * 31 + i * 7);
      h = ((h << 5) ^ (h >>> 2) ^ 0x9e3779b9) >>> 0;
      s += h.toString(16).padStart(8, '0');
    }
    return s + h.toString(16).padStart(8,'0');
  }
}

async function doLogin() {
  const user = document.getElementById('loginUser')?.value?.trim().toLowerCase();
  const pass = document.getElementById('loginPass')?.value;
  const err = document.getElementById('loginErr');
  if (!user || !pass) return;
  try {
    const hash = await hashPass(pass);
    let users = lsUsers();
    if (S.online) {
      try {
        const remote = await sbGet('usuarios', `usuario=eq.${encodeURIComponent(user)}&ativo=eq.true`);
        if (remote.length) { lsPutUser( remote[0]); users = lsUsers(); }
      } catch(e){}
    }
    const found = users.find(u => u.usuario === user && u.senha_hash === hash && u.ativo);
    if (found) { err.style.display='none'; await entrar(found); }
    else { err.textContent='Utilizador ou senha incorretos'; err.style.display='block'; }
  } catch(e) { err.textContent = 'Erro ao entrar: ' + e.message; err.style.display='block'; }
}

async function doTrocarSenha() {
  const atual = document.getElementById('senhaAtual').value;
  const nova = document.getElementById('senhaNova').value;
  const confirm = document.getElementById('senhaConfirm').value;
  const errEl = document.getElementById('senhaErr');
  if (!atual || !nova || !confirm) { errEl.textContent='Preencha todos os campos'; errEl.style.display='block'; return; }
  if (nova.length < 4) { errEl.textContent='Nova senha muito curta'; errEl.style.display='block'; return; }
  if (nova !== confirm) { errEl.textContent='As senhas não coincidem'; errEl.style.display='block'; return; }
  const hashAtual = await hashPass(atual);
  if (hashAtual !== S.currentUser.senha_hash) { errEl.textContent='Senha atual incorreta'; errEl.style.display='block'; return; }
  const hashNova = await hashPass(nova);
  S.currentUser.senha_hash = hashNova;
  lsPutUser( S.currentUser);
  if (S.online) { try { await sbPatch('usuarios', `id=eq.${S.currentUser.id}`, { senha_hash: hashNova }); } catch(e){} }

}

function mesaCard(mesa) {
  const c = getComanda(mesa.id);
  const ocu = !!c;
  const totalBruto = ocu ? comandaTotal(c.id) : 0;
  const jaPagoCard = ocu ? (c.pagamentos_parciais||[]).reduce((s,p)=>s+p.valor,0) : 0;
  const total = totalBruto - jaPagoCard;
  const hasCv = ocu && (c.couvert_valor||0) > 0;
  let inner = '';
  if (hasCv) inner += '<div class="couvert-pip">COUVERT</div>';
  inner += '<div class="mesa-num">' + mesa.numero + '</div>';
  if (mesa.nome) inner += '<div class="mesa-label">' + mesa.nome + '</div>';
  if (mesa.lugares) inner += '<div style="font-size:16px;font-weight:800;color:var(--text2);margin-top:2px">🪑 ' + mesa.lugares + '</div>';
  if (ocu) {
    if (c.nome_cliente) inner += '<div class="mesa-extra" style="font-weight:800;color:var(--text)">' + c.nome_cliente + '</div>';
    inner += '<div class="mesa-extra">' + elapsed(c.abertura_at) + '</div>';
    inner += '<div class="mesa-total">' + fmtR(total) + '</div>';
  } else { inner += '<div class="mesa-label" style="color:var(--text3)">livre</div>'; }
  return '<div class="mesa-card ' + (ocu ? 'ocupada' : '') + '" data-mid="' + mesa.id + '">' + inner + '</div>';
}
function pgMesas() {
  const baixos = S.produtos.filter(p => p.controla_estoque && p.estoque_minimo > 0 && p.quantidade_estoque <= p.estoque_minimo);
  let h = '';
  if (baixos.length) h += '<div class="alert alert-warn">⚠️ Estoque baixo: ' + baixos.map(p => p.nome + ' (' + p.quantidade_estoque + '/' + p.estoque_minimo + ' ' + (p.unidade||'un') + ')').join(' · ') + '</div>';
  h += '<div class="sec-hdr" style="margin-bottom:4px"><span></span><button class="btn btn-primary btn-sm" onclick="mAddMesa()">+ Mesa</button></div>';
  if (!S.mesas.length) return h + '<div class="empty"><div class="empty-icon">🪑</div><p>Nenhuma mesa cadastrada</p><p class="fs12 c-muted mt8">Adicione mesas em Configurações</p></div>';
  const grupos = { Mesa: [], Bistro: [] };
  S.mesas.forEach(function(m) { var cat = m.categoria || 'Mesa'; if (!grupos[cat]) grupos[cat] = []; grupos[cat].push(m); });
  var secoes = [['Mesa','🪑 Mesas'],['Bistro','☕ Bistrôs']].filter(function(pair){ return grupos[pair[0]] && grupos[pair[0]].length > 0; });
  secoes.forEach(function(pair) {
    var cat = pair[0], label = pair[1];
    h += '<div style="font-family:Bebas Neue,sans-serif;font-size:20px;letter-spacing:2px;color:var(--gold);margin:14px 0 8px">' + label + '</div><div class="mesas-grid">';
    grupos[cat].forEach(function(mesa) { h += mesaCard(mesa); });
    h += '</div>';
  });
  return h;
}
function postMesas() { document.querySelectorAll('.mesa-card').forEach(card => { const mid = card.dataset.mid; const c = getComanda(mid); card.onclick = () => c ? mComanda(mid) : mAbrirMesa(mid); }); }

async function doAbrirMesa(mid) {
  const cv = S.couvert;

  const obs = document.getElementById('mobs')?.value||'';
  const nome_cliente = document.getElementById('mnome_cli')?.value?.trim()||'';

  S.comandas.push(comanda); 
  S.itens[comanda.id] = [];
  await idbPut('comandas', comanda);
  
  if (S.online) {
    const safeCom = { id: comanda.id, mesa_id: comanda.mesa_id, abertura_at: comanda.abertura_at, status: comanda.status, couvert_valor: comanda.couvert_valor, couvert_quantidade: comanda.couvert_quantidade, desconto: comanda.desconto, total: comanda.total, observacao: comanda.observacao };
    try { await sbPost('comandas', {...safeCom, nome_cliente: comanda.nome_cliente}); } catch(e) { try { await sbPost('comandas', safeCom); } catch(e2){} }
  }
  
  await registrarLog('Abrir mesa', `Mesa ${getMesa(mid).numero}${comanda.nome_cliente?' — '+comanda.nome_cliente:''}`);
  closeModal(); 
  toast(`Mesa ${getMesa(mid).numero} aberta!`); 
  render();
  mComanda(mid); // <-- Gatilho que puxa a tela da comanda
}

function mComanda(mid) {
  const mesa = getMesa(mid);
  const c = getComanda(mid);
  if (!c) return;
  const itens = S.itens[c.id]||[];
  const grouped = groupItens(itens);
  const sub = itens.reduce((s,i)=>s+(i.quantidade*i.preco_unitario),0);
  const cvT = (c.couvert_valor||0)*(c.couvert_quantidade||0);
  const jaPago = (c.pagamentos_parciais||[]).reduce((s,p)=>s+p.valor,0);
  const total = sub + cvT - (c.desconto||0);
  const itens_ord = [...itens].sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  let itH = '';
  if (!itens_ord.length) { itH = '<p class="fs12 c-muted tc" style="padding:14px">Nenhum item ainda</p>'; } 
  else {
    itens_ord.forEach(i => {
      const p = getProd(i.produto_id);
      const hora = i.created_at ? fmtT(i.created_at) : '';
      itH += '<div class="li"><div class="flex-1"><div class="f700">' + (i.quantidade !== 1 ? i.quantidade + 'x ' : '') + (p ? p.nome : '(removido)') + '</div><div class="fs11 c-muted">' + hora + (i.observacao ? ' · ' + i.observacao : '') + '</div></div><div class="c-gold f800">' + fmtR(i.quantidade * i.preco_unitario) + '</div><button class="btn btn-ghost btn-sm btn-icon" data-iid="' + i.id + '" data-mid="' + c.mesa_id + '" onclick="rmItemById(this.dataset.iid, this.dataset.mid)">✕</button></div>';
    });
  }

  showModal(`
    <div class="flex aic jsb" style="margin-bottom:12px">
      <div><div class="modal-title" style="margin-bottom:0">Mesa ${mesa.numero}${mesa.nome?' — '+mesa.nome:''}</div>${c.nome_cliente?`<div class="fs12" style="color:var(--text2);margin-top:2px">👤 ${c.nome_cliente}</div>`:''}</div>
      <span class="fs11 c-muted">${elapsed(c.abertura_at)}</span>
    </div>
    <div class="card" style="margin-bottom:10px">${itH}</div>
    ${cvT>0?`<div class="tr"><span class="c-muted">Couvert (${c.couvert_quantidade}x)</span><span>${fmtR(cvT)}</span></div>`:''}
    ${c.desconto>0?`<div class="tr"><span class="c-muted">Desconto</span><span class="c-green">− ${fmtR(c.desconto)}</span></div>`:''}
    <div class="tr big"><span>TOTAL</span><span id="comanda_total_${c.id}">${fmtR(total)}</span></div>
    ${jaPago>0?`<div class="tr" style="margin-top:4px"><span style="color:var(--green)">✅ Já pago</span><span style="color:var(--green);font-weight:800">${fmtR(jaPago)}</span></div><div class="tr"><span class="f800">Restante</span><span class="f800" style="color:var(--gold)">${fmtR(Math.max(0,total-jaPago))}</span></div>`:''}
    <div class="flex gap8 mt16">
      <button class="btn btn-primary flex-1" onclick="mAddItem('${c.id}')">+ Adicionar</button>
      <button class="btn btn-ghost" onclick="closeModal();render()">Voltar</button>
    </div>
    ${(c.pagamentos_parciais||[]).length > 0 ? '<div class="card" style="margin:8px 0;padding:10px 12px"><div class="fs11 c-muted f800" style="margin-bottom:6px">PAGAMENTOS PARCIAIS</div>' + (c.pagamentos_parciais||[]).map(p=>'<div class="tr" style="padding:3px 0"><span class="fs12 c-muted">' + fmtT(p.created_at) + ' · ' + p.obs + '</span><span class="c-green f800">' + fmtR(p.valor) + '</span></div>').join('') + '</div>' : ''}
    <div class="flex gap8 mt8">
      <button class="btn btn-ghost flex-1" onclick="mPagamentoParcial('${mid}')">💸 Parcial</button>
      <button class="btn btn-success flex-1" onclick="mFecharMesa('${mid}')">💳 Fechar Mesa</button>
    </div>
  `);
}

  function prodsH() {
    const list = selectedCat ? S.produtos.filter(p=>p.categoria_id===selectedCat && !p.is_insumo) : S.produtos.filter(p=>!p.is_insumo);
    if (!list.length) return '<p class="fs12 c-muted tc" style="padding:20px">Nenhum produto</p>';
    return list.map(p=>`
      <div class="li">

          ${p.preco_promo>0?'<span class="badge badge-y" style="margin-left:6px">Promo HH</span>':''}

        </div>

            <button class="qbtn" onclick="let i=document.getElementById('q_${p.id}');i.value=parseFloat(i.value||1)+1">+</button>

          <button class="btn btn-primary btn-sm" onclick="doAddItem('${cid}','${p.id}')">Add</button>

}

async function doAddItem(cid, pid) {
  const prod = getProd(pid);
  if (!prod) return;
  const qtdInput = document.getElementById('q_'+pid);
  const qtd = qtdInput ? (parseFloat(String(qtdInput.value).replace(',','.'))||1) : 1;
  
  // REGRA: HAPPY HOUR (Apenas Hora e Dia da Semana)
  let precoFinal = prod.preco;
  if (prod.preco_promo > 0) {
    const agora = new Date();
    const horaAtual = String(agora.getHours()).padStart(2,'0') + ':' + String(agora.getMinutes()).padStart(2,'0');
    const diaSemana = agora.getDay().toString();
    
    let dentroHorario = true;
    if (prod.promo_inicio && prod.promo_fim) {
      if (prod.promo_inicio <= prod.promo_fim) {
        dentroHorario = horaAtual >= prod.promo_inicio && horaAtual <= prod.promo_fim;
      } else {
        dentroHorario = horaAtual >= prod.promo_inicio || horaAtual <= prod.promo_fim;
      }
    } else if (prod.promo_inicio) {
      dentroHorario = horaAtual >= prod.promo_inicio;
    } else if (prod.promo_fim) {
      dentroHorario = horaAtual <= prod.promo_fim;
    }

    const diaValido = prod.promo_dias && prod.promo_dias.includes(diaSemana);

    if (dentroHorario && diaValido) {
      precoFinal = prod.preco_promo;
      toast(`🍺 Promoção aplicada!`, 2000);
    }
  }

  const item = { id: uid(), comanda_id: cid, produto_id: pid, quantidade: qtd, preco_unitario: precoFinal, status: 'pendente', created_at: new Date().toISOString() };
  if (!S.itens[cid]) S.itens[cid]=[];
  S.itens[cid].push(item);
  await idbPut('itens_comanda', item);

  // REGRA: BAIXA DE ESTOQUE VIA FICHA TÉCNICA
  let jsonComp = [];
  try { jsonComp = typeof prod.composicao === 'string' ? JSON.parse(prod.composicao) : (prod.composicao || []); } catch(e){}

  if (jsonComp.length > 0) {
    for (const comp of jsonComp) {
      const insumo = getProd(comp.id);
      if (insumo && insumo.controla_estoque) {
        const debito = qtd * (comp.qtd || 1);
        insumo.quantidade_estoque = Math.max(0, Math.round(((insumo.quantidade_estoque||0) - debito) * 1000) / 1000);
        await idbPut('produtos', insumo);
        if (S.online) { try { await sbPatch('produtos', `id=eq.${insumo.id}`, {quantidade_estoque: insumo.quantidade_estoque}); }catch(e){} }
      }
    }
  } else if (prod.controla_estoque) {
    const debito = qtd * (prod.fator_estoque || 1);
    prod.quantidade_estoque = Math.max(0, Math.round(((prod.quantidade_estoque||0) - debito) * 1000) / 1000);
    await idbPut('produtos', prod);
    if (S.online) { try { await sbPatch('produtos',`id=eq.${pid}`,{quantidade_estoque:prod.quantidade_estoque}); }catch(e){} }
  }

  if (S.online) { try { await sbPost('itens_comanda', item); }catch(e){} }
  const _c = S.comandas.find(x=>x.id===cid);
  if (_c) {
    const itens = S.itens[cid]||[];
    const sub = itens.reduce((s,i)=>s+(i.quantidade*i.preco_unitario),0);
    const cvT = (_c.couvert_valor||0)*(_c.couvert_quantidade||0);
    const totalEl = document.getElementById('comanda_total_'+cid);
    if (totalEl) totalEl.textContent = fmtR(sub+cvT-(_c.desconto||0));
  }
  mAddItem(cid);
}

async function rmItemById(iid, mid) {
  const c = getComanda(mid);
  if (!c) return;
  const itens = S.itens[c.id] || [];
  const idx = itens.findIndex(i => i.id === iid);
  if (idx < 0) return;
  const item = itens[idx];
  const prod = getProd(item.produto_id);
  
  if (prod) {
    let jsonComp = [];
    try { jsonComp = typeof prod.composicao === 'string' ? JSON.parse(prod.composicao) : (prod.composicao || []); } catch(e){}
    if (jsonComp.length > 0) {
      for (const comp of jsonComp) {
        const insumo = getProd(comp.id);
        if (insumo && insumo.controla_estoque) {
          insumo.quantidade_estoque = Math.round(((insumo.quantidade_estoque || 0) + (item.quantidade * (comp.qtd || 1))) * 1000) / 1000;
          await idbPut('produtos', insumo);
          if (S.online) { try { await sbPatch('produtos', 'id=eq.' + insumo.id, { quantidade_estoque: insumo.quantidade_estoque }); } catch(e){} }
        }
      }
    } else if (prod.controla_estoque) {
      prod.quantidade_estoque = Math.round(((prod.quantidade_estoque || 0) + (item.quantidade * (prod.fator_estoque || 1))) * 1000) / 1000;
      await idbPut('produtos', prod);
      if (S.online) { try { await sbPatch('produtos', 'id=eq.' + prod.id, { quantidade_estoque: prod.quantidade_estoque }); } catch(e){} }
    }
  }
  S.itens[c.id].splice(idx, 1);
  await idbDel('itens_comanda', item.id);
  if (S.online) { try { await sbDel('itens_comanda', 'id=eq.' + item.id); } catch(e){} }
  mComanda(mid);
}

function mFecharMesa(mid) {
  const mesa = getMesa(mid); const c = getComanda(mid); if (!c) return;
  const itens = S.itens[c.id]||[]; const grouped = groupItens(itens);
  const sub = itens.reduce((s,i)=>s+(i.quantidade*i.preco_unitario),0);
  const cvT = (c.couvert_valor||0)*(c.couvert_quantidade||0);
  let sumH = grouped.map(i=>{const p=getProd(i.produto_id); return `<div class="tr"><span>${i.quantidade}x ${p?p.nome:'?'}</span><span>${fmtR(i.quantidade*i.preco_unitario)}</span></div>`}).join('');
  if (cvT>0) sumH += `<div class="tr"><span class="c-muted">Couvert (${c.couvert_quantidade}x)</span><span>${fmtR(cvT)}</span></div>`;
  sumH += `<div class="divider"></div><div class="tr"><span>Subtotal</span><span>${fmtR(sub+cvT)}</span></div>`;
  
  const jaPago = (c.pagamentos_parciais||[]).reduce((s,p)=>s+p.valor,0);
  const totalBase = sub + cvT - (c.desconto||0);
  const restantePagar = Math.max(0, totalBase - jaPago);
  
  showModal(`
    <div class="modal-title">Fechar Mesa ${mesa.numero}</div>
    ${jaPago>0?`<div class="tr" style="padding:4px 0"><span class="c-muted">Total da comanda</span><span>${fmtR(totalBase)}</span></div><div class="tr" style="padding:4px 0"><span style="color:var(--green)">✅ Já pago</span><span style="color:var(--green)">${fmtR(jaPago)}</span></div>`:''}
    <div class="card" style="margin-bottom:12px">${sumH||'<p class="fs12 c-muted tc">Nenhum item</p>'}</div>
    <div class="fg"><div class="lbl">Desconto (R$)</div><input class="inp" id="fmdesc" type="number" min="0" step="0.50" onwheel="this.blur()" value="${c.desconto||0}"></div>
    <div class="tr big" style="margin-bottom:14px"><span>${jaPago>0?'RESTA PAGAR':'TOTAL'}</span><span id="fmtotal">${fmtR(restantePagar)}</span></div>
    
    ${restantePagar > 0 ? `
    <div class="card" style="margin-bottom:14px">
      <div class="flex aic jsb" style="margin-bottom:10px"><span class="f800">Dividir a conta</span><div class="qc"><button class="qbtn" onclick="splitChange(-1)">−</button><input id="splitQty" type="number" class="inp" value="1" min="1" style="width:48px;text-align:center;padding:6px 4px" oninput="splitRender()"><button class="qbtn" onclick="splitChange(1)">+</button></div></div>
      <div id="splitInfo"></div>
    </div>
    <div id="splitPagamentos"><div class="lbl">Forma de pagamento</div><div class="pay-grid"><button class="pay-btn" data-v="dinheiro" onclick="selPay(this)">💵 Dinheiro</button><button class="pay-btn" data-v="cartao_credito" onclick="selPay(this)">💳 Crédito</button><button class="pay-btn" data-v="cartao_debito" onclick="selPay(this)">💳 Débito</button><button class="pay-btn" data-v="pix" onclick="selPay(this)">📱 Pix</button></div></div>
    <div class="divider"></div>
    <button class="btn btn-ghost w-full" onclick="mPagamentoParcialFromFecha('${mid}')">💸 Pagamento parcial avulso</button>
    ` : `<div class="alert alert-warn" style="background:#0d2e10;color:#70e070;border-color:#1c5a1e;text-align:center">Mesa totalmente paga! Clique em Confirmar para fechar.</div>`}
    
    <div class="flex gap8 mt12"><button class="btn btn-ghost flex-1" onclick="mComanda('${mid}')">← Voltar</button><button class="btn btn-success flex-1" onclick="doFechar('${mid}')">✓ Confirmar Fecho</button></div>
  `);
  
  function calcTotal() { const bruto = sub + cvT - (parseFloat(document.getElementById('fmdesc')?.value)||0); return jaPago > 0 ? Math.max(0, bruto - jaPago) : bruto; }
  
  window.splitRender = function() {
    const elQty = document.getElementById('splitQty');
    if (!elQty) return;
    const n = parseInt(elQty.value)||1;
    const tot = calcTotal(); const pp = Math.round((tot/n)*100)/100;
    const info = document.getElementById('splitInfo'); const pags = document.getElementById('splitPagamentos');
    if (n <= 1) {
      if (info) info.innerHTML = '';
      if (pags) pags.innerHTML = '<div class="lbl">Forma de pagamento</div><div class="pay-grid"><button class="pay-btn" data-v="dinheiro" onclick="selPay(this)">💵 Dinheiro</button><button class="pay-btn" data-v="cartao_credito" onclick="selPay(this)">💳 Crédito</button><button class="pay-btn" data-v="cartao_debito" onclick="selPay(this)">💳 Débito</button><button class="pay-btn" data-v="pix" onclick="selPay(this)">📱 Pix</button></div>';
    } else {
      if (info) info.innerHTML = '<div class="tr" style="padding:6px 0"><span class="c-muted fs12">Total a distribuir</span><span id="splitRestante" class="f800 c-gold">' + fmtR(tot) + '</span></div>';
      let pagsHtml = '<div class="lbl" style="margin-bottom:8px">Valor e pagamento por pessoa</div>';
      for (let i=0; i<n; i++) {
        pagsHtml += '<div class="card" style="margin-bottom:8px;padding:10px 12px"><div class="flex aic jsb" style="margin-bottom:8px"><span class="f800">Pessoa ' + (i+1) + '</span><input type="number" class="inp split-val" data-p="' + i + '" value="' + pp.toFixed(2) + '" min="0" step="0.01" onwheel="this.blur()" style="width:90px;text-align:right;padding:4px 8px" oninput="atualizarRestante(' + tot.toFixed(2) + ')"></div><div class="flex aic jsb gap8"><div class="flex gap8"><button class="pay-btn" style="padding:6px 8px;font-size:11px" data-v="dinheiro" data-p="' + i + '" onclick="selPayPessoa(this)">💵 Din</button><button class="pay-btn" style="padding:6px 8px;font-size:11px" data-v="cartao_credito" data-p="' + i + '" onclick="selPayPessoa(this)">💳 Cred</button><button class="pay-btn" style="padding:6px 8px;font-size:11px" data-v="cartao_debito" data-p="' + i + '" onclick="selPayPessoa(this)">💳 Déb</button><button class="pay-btn" style="padding:6px 8px;font-size:11px" data-v="pix" data-p="' + i + '" onclick="selPayPessoa(this)">📱 Pix</button></div><button class="btn btn-primary btn-sm" onclick="doPagamentoPessoaDivisao(' + i + ', \'' + mid + '\')">✓ Lançar</button></div></div>';
      }
      if (pags) pags.innerHTML = pagsHtml;
    }
  };
  
  window.atualizarRestante = function(tot) {
    const inputs = document.querySelectorAll('.split-val'); const usado = Array.from(inputs).reduce((s,i)=>s+(parseFloat(String(i.value).replace(',','.'))||0),0);
    const resto = tot - usado; const el = document.getElementById('splitRestante');
    if (el) { el.textContent = fmtR(Math.abs(resto)); el.style.color = Math.abs(resto)<0.01?'var(--green)':resto<0?'var(--red)':'var(--gold)'; }
  };
  
  window.splitChange = function(d) { const el = document.getElementById('splitQty'); if(el){ el.value = Math.max(1,(parseInt(el.value)||1)+d); window.splitRender(); } };
  const descEl = document.getElementById('fmdesc');
  if(descEl) descEl.oninput = e => { const d = parseFloat(String(e.target.value).replace(',','.'))||0; const elTot = document.getElementById('fmtotal'); if(elTot) elTot.textContent = fmtR(sub+cvT-d); window.splitRender(); };
  window.splitRender();
}

window.selPay = btn => { document.querySelectorAll('.pay-btn:not([data-p])').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); };
window.selPayPessoa = btn => { const p = btn.dataset.p; document.querySelectorAll(`.pay-btn[data-p="${p}"]`).forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); };

window.doPagamentoPessoaDivisao = async function(idx, mid) {
  const c = getComanda(mid); if (!c) return;
  const payBtn = document.querySelector(`.pay-btn[data-p="${idx}"].sel`);
  if (!payBtn) { toast(`Selecione a forma de pagamento da Pessoa ${idx+1}`); return; }
  
  const inputEl = document.querySelector(`.split-val[data-p="${idx}"]`);
  const valor = parseFloat(String(inputEl.value).replace(',', '.'));
  if (!valor || valor <= 0) { toast('Valor inválido'); return; }

  const obs = `Pessoa ${idx+1} (Divisão)`;

  if (!c.pagamentos_parciais) c.pagamentos_parciais = [];
  const pagamento = { id: uid(), valor, forma: payBtn.dataset.v, obs, created_at: new Date().toISOString() };
  c.pagamentos_parciais.push(pagamento);
  await idbPut('comandas', c);

  if (S.caixaSessao) {
    const mov = { id:uid(), sessao_id:S.caixaSessao.id, tipo:'entrada', valor, forma_pagamento:payBtn.dataset.v, descricao:'Mesa ' + getMesa(mid).numero + ' — parcial: ' + obs, comanda_id:c.id, created_at:new Date().toISOString() };
    await idbPut('caixa_movimentacoes', mov);

  }

  await registrarLog('Pagamento parcial', 'Mesa ' + getMesa(mid).numero + ': ' + fmtR(valor) + ' — ' + obs);

};

async function doFechar(mid) {
  const c = getComanda(mid); if (!c) return;
  const elQty = document.getElementById('splitQty');
  const n = elQty ? (parseInt(elQty.value)||1) : 1;
  const desc = parseFloat(String(document.getElementById('fmdesc')?.value||'0').replace(',','.'))||0;
  const itens = S.itens[c.id]||[];
  const sub = itens.reduce((s,i)=>s+(i.quantidade*i.preco_unitario),0);
  const cvT = (c.couvert_valor||0)*(c.couvert_quantidade||0);
  const total = sub+cvT-desc;
  const jaPago = (c.pagamentos_parciais||[]).reduce((s,p)=>s+p.valor,0);
  const restante = Math.max(0, total - jaPago);
  
  let forma = 'múltiplo';
  
  if (restante > 0) {
    if (n <= 1) {
      const payBtn = document.querySelector('.pay-btn.sel:not([data-p])');
      if (!payBtn) { toast('Selecione a forma de pagamento'); return; }
      forma = payBtn.dataset.v;
    } else {
      const sels = document.querySelectorAll('.pay-btn[data-p].sel');
      if (sels.length < n) { toast(`Selecione o pagamento das ${n} pessoas`); return; }
      forma = 'dividido';
    }
  }

  Object.assign(c, { status:'fechada', fechamento_at:new Date().toISOString(), desconto:desc, total, forma_pagamento:forma });
  await idbPut('comandas', c);
  if (S.online) { try { await sbPatch('comandas','id=eq.'+c.id,{status:'fechada',fechamento_at:c.fechamento_at,desconto:desc,total,forma_pagamento:forma}); }catch(e){} }
  
  if (S.caixaSessao && restante > 0) {
    if (n > 1) {
      const splitInputs = document.querySelectorAll('.split-val'); const sels = document.querySelectorAll('.pay-btn[data-p].sel');
      for (const btn of sels) {
        const pIdx = parseInt(btn.dataset.p); 
        const valStr = splitInputs[pIdx] ? splitInputs[pIdx].value : (restante/n);
        const pVal = parseFloat(String(valStr).replace(',', '.'));
        const mov = { id:uid(), sessao_id:S.caixaSessao.id, tipo:'entrada', valor:pVal, forma_pagamento:btn.dataset.v, descricao:'Mesa ' + getMesa(mid).numero + ' (pessoa ' + (parseInt(btn.dataset.p)+1) + '/' + n + ')', comanda_id:c.id, created_at:new Date().toISOString() };
        await idbPut('caixa_movimentacoes', mov);
        if (S.online) { try { await sbPost('caixa_movimentacoes', mov); }catch(e){} }
      }
    } else {
      const mov = { id:uid(), sessao_id:S.caixaSessao.id, tipo:'entrada', valor:restante, forma_pagamento:forma, descricao:`Mesa ${getMesa(mid).numero}`, comanda_id:c.id, created_at:new Date().toISOString() };
      await idbPut('caixa_movimentacoes', mov);
      if (S.online) { try { await sbPost('caixa_movimentacoes', mov); }catch(e){} }
    }
  }
  await registrarLog('Fechar mesa', `Mesa ${getMesa(mid).numero} fechada`);
  S.comandas = S.comandas.filter(x=>x.id!==c.id); delete S.itens[c.id];
  closeModal(); toast(`Mesa ${getMesa(mid).numero} fechada!`); render();
}

function mPagamentoParcial(mid) {
  const mesa = getMesa(mid);

  const itens = S.itens[c.id]||[];
  const sub = itens.reduce((s,i)=>s+(i.quantidade*i.preco_unitario),0);
  const cvT = (c.couvert_valor||0)*(c.couvert_quantidade||0);
  const totalComanda = sub + cvT - (c.desconto||0);
  const jaPago = (c.pagamentos_parciais||[]).reduce((s,p)=>s+p.valor,0);

    + '</div>'
    + '<div class="fg"><div class="lbl">Valor a pagar agora</div>'

function mEditProd(id) {
  const p = S.produtos.find(x=>x.id===id); if (!p) return;
  showModal(`<div class="modal-title">Editar Produto</div>${prodForm(p)}<div class="flex gap8 mt8"><button class="btn btn-ghost flex-1" onclick="closeModal()">Cancelar</button><button class="btn btn-primary flex-1" onclick="doSaveProd('${id}')">Salvar</button></div><div class="divider"></div><button class="btn btn-danger w-full" onclick="doDelProd('${id}')">🗑️ Excluir produto</button>`);

async function doDelProd(id) {
  const p = S.produtos.find(x=>x.id===id); if (!p) return;
  const abertas = new Set(S.comandas.map(c=>c.id)); const emUso = Object.values(S.itens).flat().some(i=>i.produto_id===id && abertas.has(i.comanda_id));
  if (emUso) { toast('Produto está em comanda aberta — não é possível excluir'); return; }
  if (!await customConfirm(`Excluir "${p.nome}"?\nEsta ação não pode ser desfeita.`, 'Excluir', true)) return;
  S.produtos = S.produtos.filter(x=>x.id!==id); await idbDel('produtos', id);
  if (S.online) { try { await sbDel('produtos',`id=eq.${id}`); }catch(e){} }
  closeModal(); toast(`"${p.nome}" excluído`); render();
}
async function doSaveProd(id) {
  const nome = document.getElementById('pn')?.value?.trim(); 
  const cat = document.getElementById('pc')?.value;
  
  const parseNum = val => parseFloat(String(val).replace(',','.')) || 0;
  
  const preco = parseNum(document.getElementById('pp')?.value); 
  const unidade = document.getElementById('pu')?.value?.trim()||'un';
  const est = document.getElementById('pe')?.checked; 
  const qtd = parseNum(document.getElementById('pq')?.value);
  const min = parseNum(document.getElementById('pm')?.value); 
  const fator = parseNum(document.getElementById('pf')?.value) || 1;
  const ativo = id ? (document.getElementById('pativo')?.checked??true) : true;
  
  const preco_promo = parseNum(document.getElementById('p_promo')?.value);
  const promo_inicio = document.getElementById('p_ini')?.value||null;
  const promo_fim = document.getElementById('p_fim')?.value||null;
  const promo_dias = Array.from(document.querySelectorAll('.p_dia:checked')).map(c=>c.value).join(',');

  if (!nome || !cat || preco === 0) { toast('Preencha nome, categoria e o preço normal'); return; }
  
  const pData = { nome, categoria_id:cat, preco, unidade, controla_estoque:est, quantidade_estoque:qtd, estoque_minimo:min, fator_estoque:fator, ativo, preco_promo, promo_inicio, promo_fim, promo_dias };

  if (id) {
    const p = S.produtos.find(x=>x.id===id);
    Object.assign(p, pData);
    await idbPut('produtos', p);
    if (S.online) { try { await sbPatch('produtos',`id=eq.${id}`,pData); }catch(e){} }
    toast('Produto atualizado!');
  } else {
    const p = { id:uid(), ...pData, created_at:new Date().toISOString() };
    S.produtos.push(p); await idbPut('produtos', p);
    if (S.online) { try { await sbPost('produtos', p); }catch(e){} }
    toast(`"${nome}" criado!`);
  }
  closeModal(); render();
}

function pgEstoque() {
  const q = S.estoqSearch.toLowerCase(); const selCat = S.estoqCat;
  const list = S.produtos.filter(p=>p.controla_estoque &&(!q||p.nome.toLowerCase().includes(q)) &&(!selCat||p.categoria_id===selCat));
  const baixos = list.filter(p=>p.estoque_minimo>0&&p.quantidade_estoque<=p.estoque_minimo);
  let h = `<div class="sec-hdr"><span class="sec-title">ESTOQUE</span><div class="flex gap8"><button class="btn btn-ghost btn-sm" onclick="mBaixaLivre('consumo_proprio')">🧉 Consumo</button><button class="btn btn-danger btn-sm" onclick="mBaixaLivre('desperdicio')">🗑️ Desperdício</button></div></div>`;
  if (baixos.length) h += `<div class="alert alert-err"><strong>⚠️ Abaixo do mínimo:</strong><br>${baixos.map(p=>`${p.nome}: ${p.quantidade_estoque} ${p.unidade||'un'} (mín: ${p.estoque_minimo})`).join('<br>')}</div>`;
  if (S.categorias.length) h += '<div class="tabs">' + `<span class="tab ${!selCat?'active':''}" onclick="S.estoqCat=null;render()">Todos</span>` + S.categorias.map(c=>`<span class="tab ${selCat===c.id?'active':''}" onclick="S.estoqCat='${c.id}';render()">${c.nome}</span>`).join('') + '</div>';
  h += `<input class="inp" placeholder="🔍 Buscar..." value="${S.estoqSearch}" oninput="S.estoqSearch=this.value;render()" style="margin-bottom:12px">`;
  if (!list.length) return h + `<div class="empty"><div class="empty-icon">📦</div><p>Nenhum produto com controle de estoque</p></div>`;
  list.sort((a,b) => { const aB = a.estoque_minimo>0 && a.quantidade_estoque<=a.estoque_minimo; const bB = b.estoque_minimo>0 && b.quantidade_estoque<=b.estoque_minimo; return bB-aB || a.nome.localeCompare(b.nome); });
  h += '<div class="card">';
  list.forEach(p => {
    const pct = p.estoque_minimo>0 ? Math.min(100,(p.quantidade_estoque/(p.estoque_minimo*3))*100) : 60;
    const cor = p.quantidade_estoque<=0 ? 'var(--red)' : p.quantidade_estoque<=p.estoque_minimo ? 'var(--yellow)' : 'var(--green)';
    h += `<div class="li"><div class="flex-1"><div class="f700">${p.nome}</div><div class="fs12 c-muted">${p.quantidade_estoque} ${p.unidade||'un'}${p.estoque_minimo>0?' · mín: '+p.estoque_minimo:''}</div><div class="sbar"><div class="sbar-fill" style="width:${pct}%;background:${cor}"></div></div></div><div class="flex gap8"><button class="btn btn-ghost btn-sm btn-icon" onclick="mEditProd('${p.id}')">✏️</button><button class="btn btn-ghost btn-sm" onclick="mAjuste('${p.id}')">📊</button></div></div>`;

async function doAjuste(pid) {
  const p = S.produtos.find(x=>x.id===pid); if (!p) return;
  const tipo = document.getElementById('atipo').value; const qtd = parseFloat(document.getElementById('aqtd').value||0); const obs = document.getElementById('aobs').value;
  let nova = p.quantidade_estoque;
  if (tipo==='entrada') nova += qtd; else if (tipo==='desperdicio'||tipo==='consumo_proprio') nova = Math.max(0,nova-qtd); else nova = qtd;
  p.quantidade_estoque = nova; await idbPut('produtos', p);
  const mov = { id:uid(), produto_id:pid, tipo, quantidade:qtd, observacao:obs, created_at:new Date().toISOString() };
  await idbPut('movimentacoes_estoque', mov);
  if (S.online) { try { await sbPatch('produtos',`id=eq.${pid}`,{quantidade_estoque:nova}); await sbPost('movimentacoes_estoque',mov); }catch(e){} }
  closeModal(); toast(`Estoque: ${nova} ${p.unidade||'un'}`); render();
}

function pgFinanceiro() {

}

async function postFinanceiro() {
  const el = document.getElementById('finBody'); if (!el) return;
  const dataAtual = new Date(); const mesAtual = dataAtual.getMonth(); const anoAtual = dataAtual.getFullYear();

  const movsCaixa = await idbAll('caixa_movimentacoes');
  const entradasMes = movsCaixa.filter(m => { const d = new Date(m.created_at); return m.tipo === 'entrada' && d.getMonth() === mesAtual && d.getFullYear() === anoAtual; }).reduce((s, m) => s + m.valor, 0);

  const despesas = await idbAll('despesas');
  const despesasMes = despesas.filter(d => {
    if(!d.data_vencimento) return false;
    const v = new Date(d.data_vencimento + 'T12:00:00'); return v.getMonth() === mesAtual && v.getFullYear() === anoAtual;
  }).sort((a,b) => new Date(a.data_vencimento) - new Date(b.data_vencimento));

  const totalDespesas = despesasMes.reduce((s, d) => s + d.valor, 0);
  const lucroLiquido = entradasMes - totalDespesas;
  const margem = entradasMes > 0 ? ((lucroLiquido / entradasMes) * 100).toFixed(1) : 0;

  const despesasHtml = !despesasMes.length ? '<p class="fs12 c-muted tc">Nenhuma despesa lançada neste mês</p>' : despesasMes.map(d => {
      const pago = d.status === 'pago';
      return `<div class="li"><div class="flex-1"><div class="f700">${d.descricao}</div><div class="fs11 c-muted">Venc: ${new Date(d.data_vencimento+'T12:00:00').toLocaleDateString('pt-BR')} · ${pago?'<span class="c-green">Pago</span>':'<span class="c-red">Pendente</span>'}</div></div><div class="flex aic gap8"><span class="f800 c-red">− ${fmtR(d.valor)}</span><button class="btn btn-ghost btn-sm btn-icon" onclick="mEditDespesa('${d.id}')">✏️</button></div></div>`;
    }).join('');

  el.innerHTML = `
    <div class="card" style="margin-bottom:14px; border: 2px solid var(--border)">
      <div class="fs11 c-muted f800 tc" style="margin-bottom:12px; letter-spacing: 1px">DRE SIMPLIFICADO - MÊS ATUAL</div>
      <div class="tr"><span class="c-muted">Receita Bruta (Vendas)</span><span class="f800 c-green">${fmtR(entradasMes)}</span></div>
      <div class="tr"><span class="c-muted">(-) Custos e Despesas</span><span class="f800 c-red">− ${fmtR(totalDespesas)}</span></div>
      <div class="divider"></div>
      <div class="tr big"><span>LUCRO LÍQUIDO</span><span style="color: ${lucroLiquido >= 0 ? 'var(--green)' : 'var(--red)'}">${fmtR(lucroLiquido)}</span></div>
      <div class="tc fs12 mt8" style="color:var(--text2)">Margem de Lucro: <strong>${margem}%</strong></div>
    </div>
    <div class="fs11 c-muted f800" style="margin-bottom:8px; letter-spacing:.5px; text-transform:uppercase">Contas e Despesas do Mês</div>
    <div class="card">${despesasHtml}</div>`;
}

async function doSalvarDespesa(id) {

  if (S.online) {
    if (id) { try { await sbPatch('despesas', 'id=eq.'+id, despesa); } catch(e){} }

  closeModal(); toast('Despesa salva!'); render();
}

async function doDelDespesa(id) {

}

async function doNovoUsuario() {
  const nome = document.getElementById('unome')?.value?.trim();
  const usuario = document.getElementById('ulogin')?.value?.trim().toLowerCase();
  const senha = document.getElementById('usenha')?.value;
  const perfil = document.getElementById('uperfil')?.value;
  if (!nome||!usuario||!senha) { toast('Preencha todos os campos'); return; }
  if (senha.length < 4) { toast('Senha muito curta'); return; }
  const existing = (lsUsers()).find(u=>u.usuario===usuario);
  if (existing) { toast('Utilizador já existe'); return; }
  const hash = await hashPass(senha);
  const u = { id:uid(), nome, usuario, senha_hash:hash, perfil, ativo:true, created_at:new Date().toISOString() };
  lsPutUser( u);
  if (S.online) { try { await sbPost('usuarios', u); }catch(e){} }
  await registrarLog('Novo utilizador', `${nome} (${usuario}) criado`);
  closeModal(); toast(`Utilizador "${nome}" criado!`); render();
}

async function toggleUsuario(id, ativo) {
  const users = lsUsers();
  const u = users.find(x=>x.id===id);
  if (!u) return;
  u.ativo = !ativo;
  lsPutUser( u);
  if (S.online) { try { await sbPatch('usuarios',`id=eq.${id}`,{ativo:u.ativo}); }catch(e){} }
  toast(u.ativo ? `${u.nome} reativado` : `${u.nome} desativado`);
  loadUserList();
}

async function doSaveCouvert() {
  const val = parseFloat(document.getElementById('cvValor').value||0);
  await doSaveCouvertVal(val, true);
}
async function doSaveCouvertVal(valor, ativo) {
  const cfg = { id:uid(), valor, ativo, criado_em:new Date().toISOString() };
  S.couvert = cfg; await idbPut('couvert_config', cfg);
  if (S.online) { try { await sbPost('couvert_config', cfg); }catch(e){} }

}

function mNovaMesa(catPreset) {
  catPreset = catPreset || 'Mesa';
  var catLabel = catPreset === 'Bistro' ? 'Bistrô' : 'Mesa';
  showModal(`<div class="modal-title">Novo(a) ${catLabel}</div>
    <div class="flex gap8">
      <div class="fg flex-1"><div class="lbl">Número *</div><input class="inp" id="mnum" type="number" min="1" placeholder="Ex: 1"></div>
      <div class="fg flex-1"><div class="lbl">Lugares</div><input class="inp" id="mlugares" type="number" min="1" placeholder="Ex: 4"></div>
    </div>
    <div class="fg" style="display:none"><input type="hidden" id="mcat" value="${catPreset}"></div>
    <div class="fs12 c-muted" style="margin-bottom:10px">Categoria: <strong>${catLabel}</strong></div>
    <div class="fg"><div class="lbl">Nome / identificação (opcional)</div><input class="inp" id="mnome" placeholder="Ex: Varanda, VIP..."></div>
    <div class="flex gap8"><button class="btn btn-ghost flex-1" onclick="closeModal()">Cancelar</button><button class="btn btn-primary flex-1" onclick="doNovaMesa()">Criar</button></div>`);
}
async function doNovaMesa() {
  const num = parseInt(document.getElementById('mnum')?.value);
  const nome = document.getElementById('mnome')?.value?.trim()||'';
  const lugares = parseInt(document.getElementById('mlugares')?.value)||0;
  const categoria = document.getElementById('mcat')?.value||'Mesa';
  if (!num||num<1) { toast('Digite um número válido'); return; }
  if (S.mesas.some(m=>m.numero===num && (m.categoria||'Mesa')===categoria)) { await customAlert('Já existe um(a) ' + (categoria==='Bistro'?'Bistrô':'Mesa') + ' com este número.', '🪑'); return; }
  const mesa = { id:uid(), numero:num, nome, lugares, categoria, ativa:true };
  S.mesas.push(mesa); S.mesas.sort((a,b)=>a.numero-b.numero);
  await idbPut('mesas', mesa);
  if (S.online) { try { await sbPost('mesas', mesa); }catch(e){} }
  closeModal(); toast(`Mesa ${num} criada!`); render();
}
async function doRmMesa(id) {
  if (getComanda(id)) { toast('Feche a comanda desta mesa primeiro'); return; }
  const mesa = getMesa(id); if (!mesa) return;
  mesa.ativa = false; S.mesas = S.mesas.filter(m=>m.id!==id);
  await idbPut('mesas', mesa);
  if (S.online) { try { await sbPatch('mesas',`id=eq.${id}`,{ativa:false}); }catch(e){} }
  toast('Mesa removida'); render();
}
async function doSync() {
  if (!S.online) { toast('Sem conexão'); return; }
  toast('A sincronizar...'); await syncQueue(); await loadRemote(); render(); toast('Sincronizado! ✓');
}

function pgRelatorios() {
  const hoje = new Date().toISOString().slice(0,10);
  return `
    <div class="sec-hdr"><span class="sec-title">RELATÓRIOS</span></div>
    <div class="tabs" id="relTabs">
      <span class="tab active" data-rel="caixa">💰 Caixa</span>
      <span class="tab" data-rel="estoque">📦 Estoque</span>
      <span class="tab" data-rel="log">📋 Log</span>
    </div>
    <div class="flex gap8" style="margin-bottom:14px">
      <div class="flex-1"><div class="lbl">De</div><input class="inp" type="date" id="relDe" value="${hoje}"></div>
      <div class="flex-1"><div class="lbl">Até</div><input class="inp" type="date" id="relAte" value="${hoje}"></div>
      <div style="display:flex;align-items:flex-end;gap:6px">
        <button class="btn btn-primary" onclick="gerarRelatorio()">Gerar</button>
        <button class="btn btn-ghost no-print" id="btnExport" style="display:none" onclick="exportarRelatorio()">📥</button>
      </div>

function postRelatorios() {
  document.querySelectorAll('#relTabs .tab').forEach(t => {
    t.onclick = () => {
      document.querySelectorAll('#relTabs .tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('relConteudo').innerHTML = '<p class="fs12 c-muted tc" style="padding:30px">Selecione o período e clique em Gerar</p>';
      const btn = document.getElementById('btnExport'); if (btn) btn.style.display='none';
    };
  });
}
function exportarRelatorio() { window.print(); }

async function gerarRelatorio() {
  const tipo = document.querySelector('#relTabs .tab.active')?.dataset.rel || 'caixa';
  const de = document.getElementById('relDe').value;
  const ate = document.getElementById('relAte').value;
  if (!de || !ate) { toast('Selecione o período'); return; }
  const deDate = new Date(de + 'T00:00:00'); const ateDate = new Date(ate + 'T23:59:59');
  const el = document.getElementById('relConteudo'); el.innerHTML = '<div class="tc" style="padding:20px"><div class="spin"></div></div>';
  const btnExp = document.getElementById('btnExport'); if (btnExp) btnExp.style.display='flex';
  if (tipo === 'caixa') await relCaixa(el, deDate, ateDate);
  else if (tipo === 'estoque') await relEstoque(el, deDate, ateDate);
  else await relLog(el, deDate, ateDate);
}

async function relCaixa(el, de, ate) {
  const allMovs = (await idbAll('caixa_movimentacoes')).filter(m => { const d = new Date(m.created_at); return d >= de && d <= ate; }).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  const allComandas = (await idbAll('comandas')).filter(c => c.status === 'fechada' && c.fechamento_at).filter(c => { const d = new Date(c.fechamento_at); return d >= de && d <= ate; });
  const allItens = await idbAll('itens_comanda');
  const entradas = allMovs.filter(m => m.tipo === 'entrada'); const saidas = allMovs.filter(m => m.tipo !== 'entrada');
  const totalEnt = entradas.reduce((s,m) => s+m.valor, 0); const totalSai = saidas.reduce((s,m) => s+m.valor, 0);
  const totalLiq = totalEnt - totalSai;
  const porForma = {}; entradas.forEach(m => { const f = m.forma_pagamento || 'outros'; if (!porForma[f]) porForma[f] = 0; porForma[f] += m.valor; });
  const nomes = { dinheiro:'💵 Dinheiro', cartao_credito:'💳 Crédito', cartao_debito:'💳 Débito', pix:'📱 Pix', dividido:'👥 Dividido', outros:'Outros' };
  const formaRows = Object.entries(porForma).sort((a,b) => b[1]-a[1]).map(([f,v]) => `<div class="tr"><span class="c-muted">${nomes[f]||f}</span><span class="f800">${fmtR(v)}</span></div>`).join('');
  const ticketMedio = allComandas.length ? totalEnt / allComandas.length : 0;
  const mesasRows = allComandas.sort((a,b)=>new Date(b.fechamento_at)-new Date(a.fechamento_at)).map(c => {
    const mesa = getMesa(c.mesa_id); const itens = allItens.filter(i => i.comanda_id === c.id); const itensG = groupItens(itens);
    const itensHtml = itensG.map(i => { const p = getProd(i.produto_id); return `<div class="tr" style="padding:3px 0 3px 12px"><span class="fs12 c-muted">${i.quantidade}x ${p?p.nome:'?'}</span><span class="fs12">${fmtR(i.quantidade*i.preco_unitario)}</span></div>`; }).join('');
    return `<div style="border-bottom:1px solid var(--border);padding:8px 0"><div class="flex aic jsb" style="cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'"><div><span class="f800">Mesa ${mesa?mesa.numero:'?'}${c.nome_cliente?' — '+c.nome_cliente:''}</span><span class="fs11 c-muted"> · ${fmtT(c.fechamento_at)} · ${nomes[c.forma_pagamento]||c.forma_pagamento||''}</span></div><span class="c-gold f800">${fmtR(c.total)} ▾</span></div><div style="display:none">${itensHtml||'<p class="fs11 c-muted" style="padding:4px 12px">Sem itens</p>'}</div></div>`;
  }).join('');
  el.innerHTML = `<div class="card" style="margin-bottom:10px"><div class="fs11 c-muted f800" style="margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase">Resumo</div><div class="tr"><span class="c-green">Total entradas</span><span class="c-green f800">${fmtR(totalEnt)}</span></div><div class="tr"><span class="c-red">Total saídas</span><span class="c-red f800">− ${fmtR(totalSai)}</span></div><div class="tr big"><span>LÍQUIDO</span><span>${fmtR(totalLiq)}</span></div><div class="divider"></div><div class="tr"><span class="c-muted">Mesas fechadas</span><span class="f800">${allComandas.length}</span></div><div class="tr"><span class="c-muted">Ticket médio</span><span class="f800">${fmtR(ticketMedio)}</span></div></div>${formaRows ? `<div class="card" style="margin-bottom:10px"><div class="fs11 c-muted f800" style="margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase">Por forma de pagamento</div>${formaRows}</div>` : ''}${mesasRows ? `<div class="card" style="margin-bottom:10px"><div class="fs11 c-muted f800" style="margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase">Mesas fechadas — clique para ver detalhes</div>${mesasRows}</div>` : ''}<div class="card"><div class="fs11 c-muted f800" style="margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase">Todas as movimentações (${allMovs.length})</div>${!allMovs.length ? '<p class="fs12 c-muted tc">Nenhuma movimentação no período</p>' : allMovs.map(m => `<div class="li"><div class="flex-1"><div class="f700 fs12">${m.descricao||m.tipo}</div><div class="fs11 c-muted">${new Date(m.created_at).toLocaleDateString('pt-BR')} ${fmtT(m.created_at)}${m.forma_pagamento?' · '+m.forma_pagamento:''}</div></div><div style="font-weight:800;color:${m.tipo==='entrada'?'var(--green)':'var(--red)'}">${m.tipo==='entrada'?'+':'−'} ${fmtR(m.valor)}</div></div>`).join('')}</div>`;
}

async function relEstoque(el, de, ate) {
  const movs = (await idbAll('movimentacoes_estoque')).filter(m => { const d = new Date(m.created_at); return d >= de && d <= ate; }).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  const baixos = S.produtos.filter(p => p.controla_estoque && p.estoque_minimo > 0 && p.quantidade_estoque <= p.estoque_minimo);
  const entradas = movs.filter(m => m.tipo === 'entrada'); const desperdicio = movs.filter(m => m.tipo === 'desperdicio'); const consumo = movs.filter(m => m.tipo === 'consumo_proprio');
  const allComandas = (await idbAll('comandas')).filter(c => c.status === 'fechada' && c.fechamento_at).filter(c => { const d = new Date(c.fechamento_at); return d >= de && d <= ate; });
  const comandaIds = new Set(allComandas.map(c=>c.id)); const allItens = (await idbAll('itens_comanda')).filter(i => comandaIds.has(i.comanda_id));
  const vendasMap = {};
  allItens.forEach(i => { if (!vendasMap[i.produto_id]) vendasMap[i.produto_id] = { qtd:0, total:0 }; vendasMap[i.produto_id].qtd += i.quantidade; vendasMap[i.produto_id].total += i.quantidade * i.preco_unitario; });
  const vendasRows = Object.entries(vendasMap).sort((a,b) => b[1].qtd - a[1].qtd).map(([pid, v]) => { const p = getProd(pid); return `<div class="tr"><span class="f700">${p?p.nome:pid}</span><span><span class="f800">${v.qtd} ${p?p.unidade||'un':''}</span> <span class="c-muted fs11">· ${fmtR(v.total)}</span></span></div>`; }).join('');
  const rankingCats = S.categorias.map(cat => {
    const prods = S.produtos.filter(p => p.categoria_id === cat.id);
    const ranked = prods.map(p => ({ p, v: vendasMap[p.id] || { qtd:0, total:0 } })).filter(x => x.v.qtd > 0).sort((a,b) => b.v.qtd - a.v.qtd).slice(0,3);
    if (!ranked.length) return '';
    const medals = ['🥇','🥈','🥉'];
    return `<div style="margin-bottom:10px"><div class="fs12 f800" style="color:var(--gold);margin-bottom:4px">${cat.nome}</div>${ranked.map((x,i)=>`<div class="tr" style="padding:3px 0"><span>${medals[i]} ${x.p.nome}</span><span class="f800">${x.v.qtd} ${x.p.unidade||'un'}</span></div>`).join('')}</div>`;
  }).filter(Boolean).join('');
  const estoqueRows = S.produtos.filter(p => p.controla_estoque).sort((a,b) => { const aB = a.estoque_minimo > 0 && a.quantidade_estoque <= a.estoque_minimo; const bB = b.estoque_minimo > 0 && b.quantidade_estoque <= b.estoque_minimo; return bB - aB || a.nome.localeCompare(b.nome); }).map(p => {
    const cor = p.quantidade_estoque <= 0 ? 'var(--red)' : p.quantidade_estoque <= p.estoque_minimo ? 'var(--yellow)' : 'var(--green)';
    const status = p.quantidade_estoque <= 0 ? '● Zerado' : p.quantidade_estoque <= p.estoque_minimo ? '● Baixo' : '● OK';
    return `<div class="tr"><span class="f700">${p.nome}</span><span style="color:${cor}">${p.quantidade_estoque} ${p.unidade||'un'} <span class="fs11">${status}</span></span></div>`;
  }).join('');
  el.innerHTML = `${baixos.length ? `<div class="alert alert-err" style="margin-bottom:10px">⚠️ ${baixos.length} produto(s) abaixo do mínimo</div>` : ''}${rankingCats ? `<div class="card" style="margin-bottom:10px"><div class="fs11 c-muted f800" style="margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase">🏆 Ranking por categoria</div>${rankingCats}</div>` : ''}${vendasRows ? `<div class="card" style="margin-bottom:10px"><div class="fs11 c-muted f800" style="margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase">Consumo das mesas no período</div>${vendasRows}</div>` : ''}<div class="card" style="margin-bottom:10px"><div class="fs11 c-muted f800" style="margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase">Movimentações manuais</div><div class="tr"><span class="c-muted">Entradas (reposição)</span><span class="f800 c-green">${entradas.length} lançamentos</span></div><div class="tr"><span class="c-muted">Consumo próprio</span><span class="f800">${consumo.length} lançamentos</span></div><div class="tr"><span class="c-muted">Desperdício / perda</span><span class="f800 c-red">${desperdicio.length} lançamentos</span></div></div><div class="card" style="margin-bottom:10px"><div class="fs11 c-muted f800" style="margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase">Estoque atual</div>${estoqueRows || '<p class="fs12 c-muted tc">Nenhum produto com controle de estoque</p>'}</div><div class="card"><div class="fs11 c-muted f800" style="margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase">Histórico manual no período</div>${!movs.length ? '<p class="fs12 c-muted tc">Nenhuma movimentação manual no período</p>' : movs.map(m => { const p = getProd(m.produto_id); const tipoLabel = {entrada:'📦 Entrada', desperdicio:'🗑️ Desperdício', consumo_proprio:'🧉 Consumo', ajuste:'🔧 Ajuste'}[m.tipo]||m.tipo; return `<div class="li"><div class="flex-1"><div class="f700 fs12">${tipoLabel} — ${p?p.nome:'Produto'}</div><div class="fs11 c-muted">${new Date(m.created_at).toLocaleDateString('pt-BR')} ${fmtT(m.created_at)}${m.observacao?' · '+m.observacao:''}</div></div><span class="f800">${m.quantidade} ${p?p.unidade||'un':''}</span></div>`; }).join('')}</div>`;
}

async function relLog(el, de, ate) {
  const logs = (lsLog()).filter(l => { const d = new Date(l.created_at); return d >= de && d <= ate; }).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  el.innerHTML = `<div class="card"><div class="fs11 c-muted f800" style="margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase">Log de atividades (${logs.length})</div>${!logs.length ? '<p class="fs12 c-muted tc">Nenhuma atividade no período</p>' : logs.map(l => `<div class="li"><div class="flex-1"><div class="f700 fs12">${l.atividade}</div><div class="fs11 c-muted">${l.detalhes||''}</div></div><div style="text-align:right"><div class="fs11 f800">${l.usuario_nome||''}</div><div class="fs11 c-muted">${new Date(l.created_at).toLocaleDateString('pt-BR')} ${fmtT(l.created_at)}</div></div></div>`).join('')}</div>`;
}

// ══════════════════════════════════════════════
// CUSTOM DIALOGS & CORE
// ══════════════════════════════════════════════
function customConfirm(msg, confirmLabel='Confirmar', danger=false) {
  return new Promise(res => {
    const div = document.createElement('div'); div.className = 'overlay'; div.style.zIndex = '500';
    div.innerHTML = `<div class="modal" style="max-width:380px;border-radius:20px;margin:0 16px 40px"><div style="font-size:22px;margin-bottom:12px;text-align:center">⚠️</div><p style="font-size:15px;font-weight:700;text-align:center;margin-bottom:20px;line-height:1.4">${msg}</p><div class="flex gap8"><button class="btn btn-ghost flex-1" id="ccNo">Cancelar</button><button class="btn ${danger?'btn-danger':'btn-primary'} flex-1" id="ccYes">${confirmLabel}</button></div></div>`;
    document.body.appendChild(div);
    div.querySelector('#ccNo').onclick = () => { div.remove(); res(false); }; div.querySelector('#ccYes').onclick = () => { div.remove(); res(true); };
  });
}
function customAlert(msg, icon='ℹ️') {
  return new Promise(res => {
    const div = document.createElement('div'); div.className = 'overlay'; div.style.zIndex = '500';
    div.innerHTML = `<div class="modal" style="max-width:380px;border-radius:20px;margin:0 16px 40px"><div style="font-size:28px;margin-bottom:10px;text-align:center">${icon}</div><p style="font-size:14px;font-weight:700;text-align:center;margin-bottom:20px;line-height:1.4">${msg}</p><button class="btn btn-primary w-full" onclick="this.closest('.overlay').remove()">OK</button></div>`;
    document.body.appendChild(div);
  });
}
function showModal(html) { document.getElementById('mc').innerHTML = `<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">${html}</div></div>`; }
function closeModal() { document.getElementById('mc').innerHTML=''; }

// ══════════════════════════════════════════════
// SINCRONIZAÇÃO AUTOMÁTICA E INIT
// ══════════════════════════════════════════════
setInterval(async () => {
  if (navigator.onLine && S.online && S.currentUser) {
    updateNet(); await syncQueue(); await loadRemote();
    if (S.page !== 'caixa' && S.page !== 'financeiro') render();
  }
}, 60000);

async function init() {
  updateNet(); await idbInit(); await loadLocal();
  if (S.online) { await loadRemote(); }
  else {
    const waitForNet = setInterval(async () => { if (navigator.onLine) { clearInterval(waitForNet); await loadRemote(); render(); toast('Dados carregados ✓'); } }, 1500);
    setTimeout(() => clearInterval(waitForNet), 30000);
  }
  const _users = lsUsers();
  S.currentUser = _users[0] || { id: 'temp', nome: 'Administrador', usuario: 'admin', perfil: 'admin' };
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('userBadge').style.display = 'flex';
  document.getElementById('userNome').textContent = '👤 ' + S.currentUser.nome;
  render();
}
init();
