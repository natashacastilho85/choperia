function mPagamentoParcial(mid) {
  const mesa = getMesa(mid);
  const c = getComanda(mid);
  if (!c) return;
  const itens = S.itens[c.id]||[];
  const sub = itens.reduce((s,i)=>s+(i.quantidade*i.preco_unitario),0);
  const cvT = (c.couvert_valor||0)*(c.couvert_quantidade||0);
  const totalComanda = sub + cvT - (c.desconto||0);
  const jaPago = (c.pagamentos_parciais||[]).reduce((s,p)=>s+p.valor,0);
  const restante = totalComanda - jaPago;

  showModal('<div class="modal-title">💸 Pagamento Parcial</div>'
    + '<div class="card" style="margin-bottom:12px">'
    + '<div class="tr"><span class="c-muted">Total da comanda</span><span>' + fmtR(totalComanda) + '</span></div>'
    + (jaPago > 0 ? '<div class="tr"><span class="c-muted">Já pago</span><span class="c-green">' + fmtR(jaPago) + '</span></div>' : '')
    + '<div class="tr big"><span>Restante</span><span>' + fmtR(restante) + '</span></div>'
    + '</div>'
    + '<div class="fg"><div class="lbl">Valor a pagar agora</div>'
    + '<input class="inp" id="ppValor" type="number" min="0" step="0.50" placeholder="' + restante.toFixed(2) + '"></div>'
    + '<div class="lbl" style="margin-bottom:8px">Forma de pagamento</div>'
    + '<div class="pay-grid">'
    + '<button class="pay-btn" data-v="dinheiro" onclick="selPay(this)">💵 Dinheiro</button>'
    + '<button class="pay-btn" data-v="cartao_credito" onclick="selPay(this)">💳 Crédito</button>'
    + '<button class="pay-btn" data-v="cartao_debito" onclick="selPay(this)">💳 Débito</button>'
    + '<button class="pay-btn" data-v="pix" onclick="selPay(this)">📱 Pix</button>'
    + '</div>'
    + '<div class="fg"><div class="lbl">Observação (quem está pagando)</div>'
    + '<input class="inp" id="ppObs" placeholder="Ex: João, pessoa da direita..."></div>'
    + '<div class="flex gap8 mt12">'
    + '<button class="btn btn-ghost flex-1" onclick="mComanda(\'' + mid + '\')">← Voltar</button>'
    + '<button class="btn btn-success flex-1" onclick="doPagamentoParcial(\'' + mid + '\')">✓ Registrar</button>'
    + '</div>');
}

async function doPagamentoParcial(mid) {
  const c = getComanda(mid);
  if (!c) return;
  const payBtn = document.querySelector('.pay-btn.sel');
  if (!payBtn) { toast('Selecione a forma de pagamento'); return; }
  const valor = parseFloat(document.getElementById('ppValor').value);
  const obs = document.getElementById('ppObs').value||'pagamento parcial';
  if (!valor || valor <= 0) { toast('Digite um valor'); return; }

  // Register in comanda
  if (!c.pagamentos_parciais) c.pagamentos_parciais = [];
  const pagamento = { id: uid(), valor, forma: payBtn.dataset.v, obs, created_at: new Date().toISOString() };
  c.pagamentos_parciais.push(pagamento);
  await idbPut('comandas', c);
  // pagamentos_parciais stored locally only (column may not exist in Supabase)

  // Register in caixa
  if (S.caixaSessao) {
    const mov = { id:uid(), sessao_id:S.caixaSessao.id, tipo:'entrada', valor,
      forma_pagamento:payBtn.dataset.v,
      descricao:'Mesa ' + getMesa(mid).numero + ' — parcial: ' + obs,
      comanda_id:c.id, created_at:new Date().toISOString() };
    await idbPut('caixa_movimentacoes', mov);
    if (S.online) { try { await sbPost('caixa_movimentacoes', mov); } catch(e){} }
  }

  await registrarLog('Pagamento parcial', 'Mesa ' + getMesa(mid).numero + ': ' + fmtR(valor) + ' — ' + obs);
  toast('Pagamento de ' + fmtR(valor) + ' registrado!');
  mComanda(mid);
}

        <div class="qc">
          <button class="qbtn" onclick="let i=document.getElementById('bq_${p.id}');i.value=Math.max(0,parseFloat(i.value||0)-1)">−</button>
          <input id="bq_${p.id}" type="number" class="inp" value="0" min="0" step="0.5" style="width:48px;text-align:center;padding:6px 4px">
          <button class="qbtn" onclick="let i=document.getElementById('bq_${p.id}');i.value=parseFloat(i.value||0)+1">+</button>
        </div>
      </div>`).join('');
  }

  showModal(`
    <div class="modal-title">${titulo}</div>
    <p class="fs12 c-muted" style="margin-bottom:12px">Selecione os produtos e quantidades. O estoque será debitado automaticamente.</p>
    <div id="btabs">${tabsH()}</div>
    <div id="bprods" class="card" style="margin-bottom:12px">${prodsH(selCat)}</div>
    <div class="flex gap8">
      <button class="btn btn-ghost flex-1" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary flex-1" onclick="doConfirmarBaixa('${tipo}')">✓ Confirmar baixa</button>
    </div>`);
}

window.filterBaixaCat = function(catId, tipo) {
  S.catTab = catId;
  const selCat = catId;
  document.getElementById('btabs').innerHTML = '<div class="tabs">'
    + `<span class="tab ${!catId?'active':''}" onclick="filterBaixaCat(null,'${tipo}')">Todos</span>`
    + S.categorias.map(c=>`<span class="tab ${catId===c.id?'active':''}" onclick="filterBaixaCat('${c.id}','${tipo}')">${c.nome}</span>`).join('')
    + '</div>';
  const list = catId ? S.produtos.filter(p=>p.categoria_id===catId) : S.produtos;
  document.getElementById('bprods').innerHTML = !list.length
    ? '<p class="fs12 c-muted tc" style="padding:20px">Nenhum produto</p>'
    : list.map(p=>`
      <div class="li">
        <div class="flex-1">
          <div class="f700">${p.nome}</div>
          <div class="fs12 c-muted">${p.controla_estoque?`estq: ${p.quantidade_estoque} ${p.unidade||'un'}`:'sem controle de estoque'}</div>
        </div>
        <div class="qc">
          <button class="qbtn" onclick="let i=document.getElementById('bq_${p.id}');i.value=Math.max(0,parseFloat(i.value||0)-1)">−</button>
          <input id="bq_${p.id}" type="number" class="inp" value="0" min="0" step="0.5" style="width:48px;text-align:center;padding:6px 4px">
          <button class="qbtn" onclick="let i=document.getElementById('bq_${p.id}');i.value=parseFloat(i.value||0)+1">+</button>
        </div>
      </div>`).join('');
};

async function doConfirmarBaixa(tipo) {
  const inputs = document.querySelectorAll('[id^="bq_"]');
  const movs = [];
  for (const input of inputs) {
    const qtd = parseFloat(input.value)||0;
    if (qtd <= 0) continue;
    const pid = input.id.replace('bq_','');
    const prod = getProd(pid);
    if (!prod) continue;
    const debito = qtd * (prod.fator_estoque||1);
    prod.quantidade_estoque = Math.max(0,(prod.quantidade_estoque||0)-debito);
    await idbPut('produtos', prod);
    if (S.online) { try { await sbPatch('produtos',`id=eq.${pid}`,{quantidade_estoque:prod.quantidade_estoque}); }catch(e){} }
    const mov = { id:uid(), produto_id:pid, tipo, quantidade:qtd, observacao:`${tipo==='consumo_proprio'?'Consumo próprio':'Desperdício'}: ${qtd} x ${prod.nome}`, created_at:new Date().toISOString() };
    await idbPut('movimentacoes_estoque', mov);
    movs.push(mov);
    if (S.online) { try { await sbPost('movimentacoes_estoque', mov); }catch(e){} }
  }
  if (!movs.length) { toast('Nenhum produto selecionado'); return; }
  await registrarLog(tipo==='consumo_proprio'?'Consumo próprio':'Desperdício', `${movs.length} produto(s) lançados`);
  closeModal();
  toast(`${movs.length} produto(s) baixado(s) do estoque`);
  render();
}

// CUSTOM DIALOGS
// ══════════════════════════════════════════════
function customConfirm(msg, confirmLabel='Confirmar', danger=false) {
  return new Promise(res => {
    const div = document.createElement('div');
    div.className = 'overlay';
    div.style.zIndex = '500';
    div.innerHTML = `<div class="modal" style="max-width:380px;border-radius:20px;margin:0 16px 40px">
      <div style="font-size:22px;margin-bottom:12px;text-align:center">⚠️</div>
      <p style="font-size:15px;font-weight:700;text-align:center;margin-bottom:20px;line-height:1.4">${msg}</p>
      <div class="flex gap8">
        <button class="btn btn-ghost flex-1" id="ccNo">Cancelar</button>
        <button class="btn ${danger?'btn-danger':'btn-primary'} flex-1" id="ccYes">${confirmLabel}</button>
      </div>
    </div>`;
    document.body.appendChild(div);
    div.querySelector('#ccNo').onclick  = () => { div.remove(); res(false); };
    div.querySelector('#ccYes').onclick = () => { div.remove(); res(true); };
  });
}

function customAlert(msg, icon='ℹ️') {
  return new Promise(res => {
    const div = document.createElement('div');
    div.className = 'overlay';
    div.style.zIndex = '500';
    div.innerHTML = `<div class="modal" style="max-width:380px;border-radius:20px;margin:0 16px 40px">
      <div style="font-size:28px;margin-bottom:10px;text-align:center">${icon}</div>
      <p style="font-size:14px;font-weight:700;text-align:center;margin-bottom:20px;line-height:1.4">${msg}</p>
      <button class="btn btn-primary w-full" onclick="this.closest('.overlay').remove()">OK</button>
    </div>`;
    document.body.appendChild(div);
  });
}

function showModal(html) {
  document.getElementById('mc').innerHTML = `

setInterval(async () => {
  // Só tenta sincronizar se estiver online, conectado ao Supabase e logado
  if (navigator.onLine && S.online && S.currentUser) {
    console.log('Iniciando sync automático de background...');
    
    // Atualiza o visual da rede na tela
    updateNet();
    
    // Envia os dados locais pendentes
    await syncQueue();
    
    // Puxa as novidades da nuvem
    await loadRemote();
    
    // Atualiza a tela sem piscar tudo (só renderiza se estiver nas abas principais)
    if (S.page !== 'caixa' && S.page !== 'relatorios') {
       render();
    }
  }
}, 60000); // 60000 milissegundos = 1 minuto

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
async function init() {
  updateNet();
  await idbInit();
  await loadLocal();
  if (S.online) await loadRemote();
  // Sincroniza ao abrir — tenta novamente se a rede ainda não estiver pronta
  if (S.online) {
    await loadRemote();
  } else {
    // Rede não disponível ainda — tenta assim que conectar
    const waitForNet = setInterval(async () => {
      if (navigator.onLine) {
        clearInterval(waitForNet);
        await loadRemote();
        render();
        toast('Dados carregados do Supabase ✓');
      }
    }, 1500);
    // Desiste após 30 segundos
    setTimeout(() => clearInterval(waitForNet), 30000);
  }
  // LOGIN DESATIVADO (modo teste)
  const _users = lsUsers();
  S.currentUser = _users[0] || { id: 'temp', nome: 'Administrador', usuario: 'admin', perfil: 'admin' };
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('userBadge').style.display = 'flex';
  document.getElementById('userNome').textContent = '👤 ' + S.currentUser.nome;
  render();

  // PWA Service Worker (inline blob)
  if ('serviceWorker' in navigator) {
    const sw = `
const CACHE='choperia-v2';
self.addEventListener('install',e=>e.waitUntil(
  caches.open(CACHE).then(c=>c.addAll([]))
));
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET')return;
  e.respondWith(
    caches.match(e.request).then(cached=>{
      const net=fetch(e.request).then(res=>{
        if(res.ok&&e.request.url.startsWith('https://fonts')){
          const cl=res.clone(); caches.open(CACHE).then(c=>c.put(e.request,cl));
        }
        return res;
      }).catch(()=>cached);
      return cached||net;
    })
  );
});`;
    const blob = new Blob([sw],{type:'text/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }
}

init();
</script>
