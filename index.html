<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#120d04">
<title>🍺 Choperia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #1a4a1b;
  --bg2:      #1f5820;
  --bg3:      #265c27;
  --card:     #1d521e;
  --border:   #2e7030;
  --gold:     #e8920a;
  --gold-lt:  #f5b040;
  --gold-dk:  #a86308;
  --text:     #ffffff;
  --text2:    #c8c8c8;
  --text3:    #c0c0c0;
  --green:    #56c464;
  --red:      #e05050;
  --yellow:   #f0c040;
  --blue:     #4090e0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}

/* ── TOP BAR ── */
.topbar{background:var(--bg2);border-bottom:2px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:3px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.net-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);background:var(--bg3);padding:4px 8px;border-radius:20px;border:1px solid var(--border)}
.net-dot{width:7px;height:7px;border-radius:50%}

/* ── MAIN ── */
.main{flex:1;padding:14px 14px 84px;overflow-y:auto;max-width:700px;width:100%;margin:0 auto}

/* ── BOTTOM NAV ── */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--border);display:flex;z-index:100;max-width:700px;margin:0 auto}
@media(min-width:700px){.bottomnav{left:50%;transform:translateX(-50%);right:auto;width:700px}}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 10px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:700;gap:3px;border:none;background:none;font-family:'Nunito',sans-serif;transition:color .2s}
.nav-btn.active{color:var(--gold)}
.nav-btn svg{width:22px;height:22px;stroke-width:1.8}

/* ── SECTION HEADER ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gold)}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
.card+.card{margin-top:10px}

/* ── MESA GRID ── */
.mesas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.mesa-card{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:14px 10px 12px;text-align:center;cursor:pointer;transition:all .15s;position:relative;user-select:none}
.mesa-card:active{transform:scale(.96)}
.mesa-card.ocupada{border-color:var(--gold);background:#231900}
.mesa-card.alerta{border-color:var(--red)}
.mesa-num{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--gold);line-height:1}
.mesa-label{font-size:11px;color:var(--text3);margin-top:2px;font-weight:700}
.mesa-extra{font-size:12px;color:var(--text2);margin-top:4px}
.mesa-total{font-size:17px;font-weight:800;color:var(--text);margin-top:4px}
.couvert-pip{position:absolute;top:8px;right:8px;background:var(--gold);color:#1a0e00;font-size:8px;font-weight:800;padding:2px 5px;border-radius:4px;letter-spacing:.5px}

/* ── BUTTONS ── */
.btn{padding:10px 16px;border-radius:10px;border:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;line-height:1}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--gold);color:#180e00}
.btn-primary:hover{
